version: "1.5"
namespace:
    key: default
    name: Default
flags:
    - key: show_onboarding
      name: show_onboarding
      type: BOOLEAN_FLAG_TYPE
      enabled: true
      rollouts:
        - segment:
            keys:
                - beta_user
            operator: OR_SEGMENT_OPERATOR
            value: true
    - key: color
      name: color
      type: VARIANT_FLAG_TYPE
      enabled: false
      variants:
        - key: red
          attachment: {}
        - key: blue
          attachment: {}
segments:
    - key: beta_user
      name: beta_user
      constraints:
        - type: STRING_COMPARISON_TYPE
          property: beta_user
          operator: eq
          value: "true"
      match_type: ALL_MATCH_TYPE
